server:
  port: 8086

spring:
  application:
    name: auth-service
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${AUTH_DATASOURCE_URL:jdbc:postgresql://localhost:5435/auth?options=-c%20TimeZone%3DUTC}
    username: ${AUTH_DATASOURCE_USERNAME:justlife}
    password: ${AUTH_DATASOURCE_PASSWORD:justlife}
  jpa:
    open-in-view: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
    url: ${AUTH_DATASOURCE_URL:jdbc:postgresql://localhost:5435/auth?options=-c%20TimeZone%3DUTC}
    user: ${AUTH_DATASOURCE_USERNAME:justlife}
    password: ${AUTH_DATASOURCE_PASSWORD:justlife}
    baseline-on-migrate: true
    validate-on-migrate: true
    locations: classpath:db/migration
    default-schema: public
    schemas: public
    connect-retries: 10

justlife:
  jwt:
    secret: ${JWT_SECRET:justlife-dev-secret-change-in-production-min-32-chars!!}
    expiration-hours: ${JWT_EXPIRATION_HOURS:24}

eureka:
  instance:
    prefer-ip-address: true
    ip-address: 127.0.0.1
    hostname: 127.0.0.1
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULTZONE:http://localhost:8761/eureka/}
