server:
  port: 8087

spring:
  application:
    name: notification-service
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${NOTIFICATIONS_DATASOURCE_URL:jdbc:postgresql://localhost:5436/notifications?options=-c%20TimeZone%3DUTC}
    username: ${NOTIFICATIONS_DATASOURCE_USERNAME:justlife}
    password: ${NOTIFICATIONS_DATASOURCE_PASSWORD:justlife}
  jpa:
    open-in-view: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
    url: ${NOTIFICATIONS_DATASOURCE_URL:jdbc:postgresql://localhost:5436/notifications?options=-c%20TimeZone%3DUTC}
    user: ${NOTIFICATIONS_DATASOURCE_USERNAME:justlife}
    password: ${NOTIFICATIONS_DATASOURCE_PASSWORD:justlife}
    baseline-on-migrate: true
    validate-on-migrate: true
    locations: classpath:db/migration
    default-schema: public
    schemas: public
    connect-retries: 10
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: notification-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

justlife:
  jwt:
    secret: ${JWT_SECRET:justlife-dev-secret-change-in-production-min-32-chars!!}
  kafka:
    booking-events-topic: ${KAFKA_TOPIC_BOOKING_EVENTS:booking.events}

eureka:
  instance:
    prefer-ip-address: true
    ip-address: 127.0.0.1
    hostname: 127.0.0.1
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULTZONE:http://localhost:8761/eureka/}
