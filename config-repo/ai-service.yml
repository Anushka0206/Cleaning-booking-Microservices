server:
  port: 8085
  forward-headers-strategy: framework

spring:
  application:
    name: ai-service

justlife:
  ai:
    provider: ${AI_PROVIDER:faq}
    openai:
      model: ${OPENAI_MODEL:gpt-4o-mini}
  booking:
    base-url: ${BOOKING_SERVICE_URL:http://localhost:8082}

springdoc:
  api-docs:
    enabled: true

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULTZONE:http://localhost:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.booking.aiservice: INFO
