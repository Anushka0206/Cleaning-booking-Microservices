server:
  port: 8082

spring:
  application:
    name: booking-service
  config:
    import: optional:configserver:http://localhost:8888
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5434/bookings?options=-c%20TimeZone%3DUTC
    username: justlife
    password: justlife
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
    url: jdbc:postgresql://localhost:5434/bookings?options=-c%20TimeZone%3DUTC
    user: justlife
    password: justlife
    locations: classpath:db/migration
    connect-retries: 10
  cache:
    type: redis
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092

justlife:
  jwt:
    secret: justlife-dev-secret-change-in-production-min-32-chars!!
  kafka:
    enabled: true
    topics:
      booking-events: booking.events
      booking-events-dlt: booking.events.dlt

eureka:
  instance:
    prefer-ip-address: true
    ip-address: 127.0.0.1
    hostname: 127.0.0.1
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
