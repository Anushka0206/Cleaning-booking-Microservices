spring:
  application:
    name: ai-service
  config:
    import: optional:configserver:http://localhost:8888
  cloud:
    config:
      override-system-properties: false

justlife:
  ai:
    provider: ${AI_PROVIDER:faq}
    openai:
      api-key: ${OPENAI_API_KEY:}
      model: ${OPENAI_MODEL:gpt-4o-mini}
