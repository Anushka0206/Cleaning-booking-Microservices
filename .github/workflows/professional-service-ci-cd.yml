name: CI/CD Pipeline for Professional Service

on:
  workflow_run:
    workflows: ["CI/CD Pipeline for Discovery Server"]
    branches: ["main"]
    types:
      - completed

permissions:
  contents: read

jobs:
  test:
    name: Test Professional Service
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
          cache-dependency-path: |
            common/pom.xml
            professional-service/pom.xml

      - name: Install common module
        run: mvn -B -f common/pom.xml clean install -DskipTests

      - name: Run professional-service tests
        run: mvn -B -f professional-service/pom.xml clean verify

  build-docker:
    name: Build Professional Service Docker Image (no push)
    runs-on: ubuntu-latest
    needs: test
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./professional-service/Dockerfile
          push: false
          tags: cleaning-booking-professional-service:ci