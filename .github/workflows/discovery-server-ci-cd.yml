name: CI/CD Pipeline for Discovery Server

on:
  workflow_run:
    workflows: ["CI/CD Pipeline for Config Server"]
    branches: ["main"]
    types:
      - completed

permissions:
  contents: read

jobs:
  test:
    name: Test Discovery Server
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Run tests
        run: mvn -B -f discovery-server/pom.xml clean verify

  build-docker:
    name: Build Discovery Server Docker Image (no push)
    runs-on: ubuntu-latest
    needs: test
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./discovery-server
          file: ./discovery-server/Dockerfile
          push: false
          tags: cleaning-booking-discovery-server:ci