name: CI/CD Pipeline for API Gateway

on:
  workflow_run:
    workflows: ["CI/CD Pipeline for Discovery Server"]
    branches: ["main"]
    types:
      - completed

permissions:
  contents: read

jobs:
  test:
    name: Test API Gateway
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Package application
        run: mvn -B -f api-gateway/pom.xml clean package -DskipTests

      - name: Run tests
        run: mvn -B -f api-gateway/pom.xml clean verify

  build-docker:
    name: Build API Gateway Docker Image (no push)
    runs-on: ubuntu-latest
    needs: test
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./api-gateway
          file: ./api-gateway/Dockerfile
          push: false
          tags: cleaning-booking-api-gateway:ci